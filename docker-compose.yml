services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hixai
      POSTGRES_PASSWORD: hixai
      POSTGRES_DB: hixai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hixai -d hixai"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://hixai:hixai@db:5432/hixai
      PORT: "3100"
      SERVE_UI: "true"
      HIXAI_DEPLOYMENT_MODE: "authenticated"
      HIXAI_DEPLOYMENT_EXPOSURE: "private"
      HIXAI_PUBLIC_URL: "${HIXAI_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - hixai-data:/hixai
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  hixai-data:
